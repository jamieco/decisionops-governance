  structure:

    corpus/00_governance:
      - adr
      - catalogue:
        - _retired
      - ci
      - freeze-manifest
      - governance-model
      - policies
      - project_instructions

    corpus/01_architecture:
      - context-map
      - domain-model
      - platform
      - positioning
      - runtime
      - specification
      - subsystems
      - threat-models
      - trust

    corpus/02_schemas:
      - capability
      - connector
      - governance
      - prompt
      - provenance

    corpus/03_api:
      - admin
      - connectors
      - control-plane

    corpus/04_intelligence:
      - ecosystem
      - enterprise_ai_workplace
      - market
      - regulatory
      - threat_landscape

    corpus/05_security:
      - controls
      - runtime
      - threat-model

    corpus/06_operations:
      - deployment
      - governance-packs
      - rollback

    corpus/07_reference:
      - acronyms
      - taxonomy
      - terminology

    corpus/08_strategy:
      - investor
      - positioning
      - roadmap

    corpus/09_sources:
      - adr
      - external research
      - sdd research
      - uploaded papers

    corpus/10_branding_and_marketing:
