notes:
  - "The manifest represents the expected structural state of the documentation corpus."
  - "All corpus taxonomy folders (00_governance through 11_development_process) are located under corpus/ at repository root per ADR-048."
  - "CI validation must fail if numbered taxonomy folders are found outside corpus/."
  - "docs/ is reserved for platform operational, support, and user documentation only."
  - "CI validation should compare repository structure against this manifest."
  - "The catalogue remains the authoritative inventory of all documents."
  - "Six PromptStudio and CLARITY working documents registered in v1.8 — non-authoritative working status; IP review in progress."
  - "files_in/ at repository root is a permanent staging folder — excluded from CI governance checks; not a corpus taxonomy location."
  - "session-history/ at repository root is a non-corpus location for Session-End Handover Records — excluded from CI governance checks."
