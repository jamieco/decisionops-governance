  root: corpus

  top_level_folders:
    - corpus/00_governance
    - corpus/01_architecture
    - corpus/02_schemas
    - corpus/03_api
    - corpus/04_intelligence
    - corpus/05_security
    - corpus/06_operations
    - corpus/07_reference
    - corpus/08_strategy
    - corpus/09_sources
    - corpus/10_branding_and_marketing
